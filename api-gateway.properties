server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-management-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.routes[1].id=theatre-service
spring.cloud.gateway.routes[1].uri=lb://theatre-management-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/theatres/**

spring.cloud.gateway.routes[2].id=booking-service
spring.cloud.gateway.routes[2].uri=lb://booking-management-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/bookings/**

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payments/**

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/notifications/**
